name: ops-router
version: "1.1"
description: "First-class tools for ops-controller verbs (list/logs/restart_container, compose_restart, compose_up) plus a pre_llm_call intent nudge so the model uses them instead of terminal docker commands."
requires_env:
  - OPS_CONTROLLER_TOKEN
provides_tools:
  - list_containers
  - container_logs
  - restart_container
  - compose_restart
  - compose_up
provides_hooks:
  - pre_llm_call
