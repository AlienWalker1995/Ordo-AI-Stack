name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_compose_smoke:
        description: "Run compose smoke test (Docker required)"
        required: false
        default: false
        type: boolean

jobs:
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@v3.88.26
        with:
          extra_args: --results=verified,unknown

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Ruff lint
        run: python -m ruff check dashboard tests model-gateway ops-controller rag-ingestion scripts comfyui-mcp orchestration-mcp worker

      - name: Create minimal .env for compose tests
        run: |
          echo "BASE_PATH=." > .env
          echo "OPS_CONTROLLER_TOKEN=placeholder-for-ci" >> .env

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          RUN_COMPOSE_SMOKE: "0"

  v2-substrate:
    name: v2 substrate (mocked-profile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            v2:
              - 'v2/**'

      - name: Set up Python
        if: steps.filter.outputs.v2 == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v2/requirements-dev.txt

      - name: Install pinned deps
        if: steps.filter.outputs.v2 == 'true'
        run: pip install -r v2/requirements-dev.txt

      - name: Ruff lint
        if: steps.filter.outputs.v2 == 'true'
        working-directory: v2
        run: python -m ruff check ordo tests

      # No GPU on CI runners — every test uses a MOCKED hardware profile (the merge-gate
      # "mocked-profile CI" requirement). Also proves the config renders from a clean checkout.
      - name: Pytest (mocked profiles)
        if: steps.filter.outputs.v2 == 'true'
        working-directory: v2
        run: PYTHONPATH=. python -m pytest -q

      - name: Fresh-install render smoke
        if: steps.filter.outputs.v2 == 'true'
        working-directory: v2
        run: |
          PYTHONPATH=. python -m ordo --source ordo.example.yaml render --out /tmp/ordo-out
          test -f /tmp/ordo-out/.env && test -f /tmp/ordo-out/docker-compose.yml

      # Prove the rendered compose is loadable by the REAL docker engine (not just a well-shaped
      # dict). `config` parses + validates; it does not create or start anything.
      # The rendered edge (caddy) requires CADDY_BIND (host tailnet IP) via ${CADDY_BIND:?...} —
      # an operator-supplied `site:` value the generic example intentionally leaves unset. Load the
      # rendered .env and add a CI-only placeholder (never used at runtime) so config can interpolate,
      # exactly as the repo-root compose-validate job does for the same strict-required var.
      - name: Rendered compose validates (docker engine)
        if: steps.filter.outputs.v2 == 'true'
        run: |
          echo "CADDY_BIND=127.0.0.1" >> /tmp/ordo-out/.env
          docker compose -f /tmp/ordo-out/docker-compose.yml --env-file /tmp/ordo-out/.env config >/dev/null
          echo "rendered compose accepted by docker compose config"

      - name: Skip (no v2 changes)
        if: steps.filter.outputs.v2 != 'true'
        run: echo "Skipping v2 substrate — no changes under v2/."

  compose-validate:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          # Create minimal .env for validation. docker-compose.yml uses
          # ${VAR:?...} strict-required syntax for several variables that
          # must be supplied by the operator at deploy time; provide
          # placeholders here so `compose config` can interpolate.
          cat > .env <<'EOF'
          BASE_PATH=.
          OPS_CONTROLLER_TOKEN=placeholder-for-ci
          CADDY_BIND=127.0.0.1
          EOF
          docker compose config

  compose-smoke:
    name: Compose smoke (optional)
    runs-on: ubuntu-latest
    if: github.event.inputs.run_compose_smoke == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: pip install -r tests/requirements.txt

      - name: Create .env
        run: |
          echo "BASE_PATH=." > .env
          echo "OPS_CONTROLLER_TOKEN=placeholder" >> .env

      - name: Run smoke tests
        run: python -m pytest tests/test_compose_smoke.py -v
        env:
          RUN_COMPOSE_SMOKE: "1"
        timeout-minutes: 10

  orchestration-stack-e2e:
    name: Orchestration stack E2E (path-gated)
    runs-on: ubuntu-latest
    needs: [pytest, compose-validate]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            stack:
              - 'docker-compose.yml'
              - 'mcp/**'
              - 'comfyui-mcp/**'
              - 'dashboard/**'
              - 'orchestration-mcp/**'
              - 'ops-controller/**'
              - 'rag-ingestion/**'
              - 'worker/**'
              - '.github/workflows/ci.yml'

      - name: Set up Python
        if: steps.filter.outputs.stack == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        if: steps.filter.outputs.stack == 'true'
        run: pip install -r tests/requirements.txt

      - name: Create .env
        if: steps.filter.outputs.stack == 'true'
        run: |
          echo "BASE_PATH=." > .env
          echo "OPS_CONTROLLER_TOKEN=placeholder" >> .env

      - name: Compose smoke (required when stack paths change)
        if: steps.filter.outputs.stack == 'true'
        run: python -m pytest tests/test_compose_smoke.py tests/test_orchestration_api.py -v
        env:
          RUN_COMPOSE_SMOKE: "1"
        timeout-minutes: 15

      - name: Skip (no stack paths in this change)
        if: steps.filter.outputs.stack != 'true'
        run: echo "Skipping compose E2E — no changes under orchestration stack paths."
