# Serves the codebase-memory 3D graph UI under the /codebase-memory/ subpath.
#
# The upstream UI is an absolute-asset SPA (it requests /assets, /api, /rpc at the
# ORIGIN ROOT) and has no base-path option, so it can't share the :443 root with
# Open WebUI (which owns /assets). nginx proxies the UI under /codebase-memory/ and
# rewrites those baked absolute paths to the prefix so every request stays under
# /codebase-memory/* (no collision, single SSO origin).
#
# NOTE (fonts): the 3D node labels are rendered by troika-three-text, whose glyph
# fonts are fetched from the EXTERNAL unicode-font-resolver CDN, NOT this origin.
# The pinned v0.8.1 bundle builds exactly one such URL as
#   `${base}/font-files/${id}/...`  where  base = https://cdn.jsdelivr.net/gh/
#   lojjic/unicode-font-resolver@v1.0.1/packages/data
# so `/font-files/` NEVER appears as an origin-relative app path. A sub_filter on
# `/font-files/` therefore only ever corrupts that CDN URL (injecting
# /codebase-memory/ into the jsdelivr path -> 404 -> every node label silently
# fails to load). Do NOT re-add a /font-files/ rewrite. (Verified live 2026-07-09:
# grep of the served bundle finds a single `"/font-files/` occurrence, always
# preceded by the jsdelivr base var.)
#
# NOTE (sub_filter drift): the rules below match the literal paths in the pinned
# v0.8.1 bundle — re-verify them when CBM_VERSION is bumped (curl the served JS and
# grep for any remaining bare "/api or "/assets, and confirm no NEW origin-relative
# path classes appeared).
worker_processes 1;
pid /run/nginx.pid;
events { worker_connections 256; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;
    gzip on;
    gzip_types text/css application/javascript application/json;

    server {
        listen 9750;
        server_name _;

        location = /codebase-memory { return 301 /codebase-memory/; }

        location /codebase-memory/ {
            # trailing slash strips the /codebase-memory/ prefix before the upstream
            proxy_pass http://127.0.0.1:9749/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            # disable upstream compression so sub_filter can rewrite the body
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/css;
            # HTML asset refs (src="/assets/...", href="/assets/...")
            sub_filter '"/assets/'     '"/codebase-memory/assets/';
            sub_filter "'/assets/"     "'/codebase-memory/assets/";
            # JS fetch() calls — double-quote, single-quote and template-literal forms
            sub_filter '"/api/'        '"/codebase-memory/api/';
            sub_filter "'/api/"        "'/codebase-memory/api/";
            sub_filter '`/api/'        '`/codebase-memory/api/';
            sub_filter '"/rpc"'        '"/codebase-memory/rpc"';
            # NOTE: intentionally NO /font-files/ rewrite — that path only ever
            # exists as a suffix on the external jsdelivr unicode-font-resolver CDN
            # URL (see header comment); rewriting it 404s all 3D node-label fonts.
        }
    }
}
