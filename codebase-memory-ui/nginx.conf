# Serves the codebase-memory 3D graph UI under the /codebase-memory/ subpath.
#
# The upstream UI is an absolute-asset SPA (it requests /assets, /api, /rpc,
# /font-files at the ORIGIN ROOT) and has no base-path option, so it can't share
# the :443 root with Open WebUI (which owns /assets). nginx proxies the UI under
# /codebase-memory/ and rewrites those baked absolute paths to the prefix so every
# request stays under /codebase-memory/* (no collision, single SSO origin).
#
# NOTE: the sub_filter rules below match the literal paths in the pinned v0.8.1
# bundle — re-verify them when CBM_VERSION is bumped (curl the served JS and grep
# for any remaining bare "/api or "/assets).
worker_processes 1;
pid /run/nginx.pid;
events { worker_connections 256; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;
    gzip on;
    gzip_types text/css application/javascript application/json;

    server {
        listen 9750;
        server_name _;

        location = /codebase-memory { return 301 /codebase-memory/; }

        location /codebase-memory/ {
            # trailing slash strips the /codebase-memory/ prefix before the upstream
            proxy_pass http://127.0.0.1:9749/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            # disable upstream compression so sub_filter can rewrite the body
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/css;
            # HTML asset refs (src="/assets/...", href="/assets/...")
            sub_filter '"/assets/'     '"/codebase-memory/assets/';
            sub_filter "'/assets/"     "'/codebase-memory/assets/";
            # JS fetch() calls — double-quote, single-quote and template-literal forms
            sub_filter '"/api/'        '"/codebase-memory/api/';
            sub_filter "'/api/"        "'/codebase-memory/api/";
            sub_filter '`/api/'        '`/codebase-memory/api/';
            sub_filter '"/rpc"'        '"/codebase-memory/rpc"';
            sub_filter '"/font-files/' '"/codebase-memory/font-files/';
            sub_filter "'/font-files/" "'/codebase-memory/font-files/";
        }
    }
}
