# Opt-in: publish Caddy's dedicated :8443 listener for the codebase-memory 3D
# graph visualization UI. The UI is an absolute-asset SPA (/assets, /api, /rpc)
# that must own its origin, so it can't share the :443 root with Open WebUI — it
# gets its own SSO-gated port. The Caddyfile already defines the :8443 site block;
# this override just publishes the host port for it.
#
# Enable (with the codebase-memory profile so the service + image exist):
#   COMPOSE_FILE=docker-compose.yml;overrides/compute.yml;overrides/codebase-memory-ui.yml
#   docker compose --profile codebase-memory up -d --build
# Then browse: https://<CADDY_TAILNET_HOSTNAME>:8443/  (Google SSO, same as :443).
services:
  caddy:
    ports:
      - "${CADDY_BIND:?CADDY_BIND must be set to the host tailnet IP}:8443:8443"
