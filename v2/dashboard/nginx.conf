# Dashboard = static SPA + a reverse proxy to the control plane. Localhost/no-auth by design
# (the agreed deployment model: the dashboard is the full control plane; auth, when wanted, is
# the optional Caddy/oauth2-proxy plugin at the edge, not baked into every service).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        try_files $uri /index.html;
    }

    # /api/* -> ops-controller (the ordo serve control plane). Strips the /api prefix.
    location /api/ {
        proxy_pass http://ops-controller:9000/;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }
}
