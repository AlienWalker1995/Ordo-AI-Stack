# Plugin manifest — data-only. Browser-based Obsidian GUI over the shared markdown memory vault,
# served under /obsidian/ behind the SSO edge. The vault is the SAME host dir the memory-vault MCP
# reads/writes, so notes the agent writes appear in the GUI and vice-versa.
id: obsidian
name: Obsidian (memory vault GUI)
description: Browser Obsidian over the shared markdown memory vault; SSO-gated at /obsidian/.
requires:
  nvidia: false            # web desktop only, no GPU
  ram_gb: 2
provides: [memory-gui]
compose_profile: obsidian  # opt-in; dormant unless the plugin is enabled / --profile obsidian
env:
  OBSIDIAN_ENABLED: "1"
services:
  - name: obsidian
    # linuxserver/obsidian selkies web-desktop, DIGEST-PINNED (resolved from tag 1.12.7 via
    # `docker pull` + `docker inspect .RepoDigests`). No floating tag — bump digest deliberately.
    image: linuxserver/obsidian@sha256:b8a0b2542f9c408f1710368f36c5349ae4dc4e69921d2b145929b16ee2919024
    # SECURITY: this web GUI embeds a full desktop with a terminal + passwordless sudo. It is SSO-
    # gated at the Caddy edge and publishes NO host port (deployment model: everything via Caddy).
    # Never add a `ports:` publish here — that would expose an unauthenticated root shell on the LAN.
    env:
      PUID: "1000"           # own the vault + config as uid 1000 (matches DATA_PATH ownership)
      PGID: "1000"
      TZ: ${TZ:-America/New_York}
      TITLE: Ordo Memory
      # Serve the app under the /obsidian/ subpath so Caddy can reverse-proxy without rewriting the
      # app's own asset URLs. Verified supported by the lsio selkies base for reverse-proxy subpaths.
      SUBFOLDER: /obsidian/
    volumes:
      # App state (Obsidian's open-vault registration, workspace layout, plugins) — persists across
      # recreates so the GUI reopens the memory vault automatically.
      - ${DATA_PATH:-./data}/obsidian-config:/config
      # The shared markdown vault, bind-mounted where Obsidian's persisted state points at it. The
      # SAME host dir the memory-vault MCP writes; RW so GUI edits land on disk for the agent to read.
      - ${MEMORY_VAULT_PATH:-${DATA_PATH:-./data}/memory-vault}:/config/vaults/memory
    healthcheck:
      # The selkies http port answers on 3000 (SUBFOLDER-aware); 200 on the subpath == app is up.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:3000/obsidian/ || exit 1"]
      start_period: 60s
      interval: 30s
      timeout: 10s
      retries: 5
