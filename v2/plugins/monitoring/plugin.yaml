id: monitoring
name: Monitoring (Grafana + Prometheus + GPU exporter)
description: Real-time llama.cpp + GPU perf. Grafana at /grafana/ (SSO), embedded in the dashboard.
requires:
  nvidia: false          # grafana + prometheus are CPU-ok; only gpu-exporter wants a GPU
  ram_gb: 2
provides: [monitoring]
compose_profile: monitoring
env:
  MONITORING_ENABLED: "1"
# Three compose services, all sha-pinned (digests carried verbatim from V1 PR #71, live-verified
# at commit 6fe4586 — do NOT bump/relax). Prometheus scrapes llamacpp:8080/metrics (render emits
# --metrics on llama-server) + gpu-exporter:9835. Config assets under v2/monitoring/.
services:
  - name: gpu-exporter
    # nvidia_gpu_exporter wraps nvidia-smi — the right tool for consumer GPUs on WSL2 (DCGM
    # does not work there). Sees ALL GPUs (no CUDA pin) so it can report on every card.
    image: utkuozdemir/nvidia_gpu_exporter@sha256:50e9be96ce3f67a75d7fd3834f2372d295c3dfcf044a36c9235e19ea7f008e58
    gpu: true
    # DRIVER-581.80 CRASH FIX (preserve): the exporter's default AUTO field discovery panics on
    # this host's driver — nvidia-smi emits `clocks_event_reasons_counters.sw_thermal_slowdown
    # [us]`, whose derived metric name has a space + brackets → invalid Prometheus name → the
    # exporter crash-loops. Pinning the fields we chart avoids the bad one (verified on 5090+1070).
    command:
      - --query-field-names=utilization.gpu,utilization.memory,memory.used,memory.total,memory.free,temperature.gpu,power.draw,fan.speed,clocks.sm,clocks.mem,name
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9835/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
  - name: prometheus
    image: prom/prometheus@sha256:6559acbd5d770b15bb3c954629ce190ac3cbbdb2b7f1c30f0385c4e05104e218
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  - name: grafana
    image: grafana/grafana@sha256:d8ea37798ccc41061a62ab080f2676dda6bf7815558499f901bdb0f533a456fb
    depends_on: [prometheus]
    # Served under /grafana/ behind Caddy (subpath rewrite); anonymous Viewer so the embed needs
    # no second login (SSO at Caddy is the real gate); embedding allowed for the dashboard iframe.
    env:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: lax
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
