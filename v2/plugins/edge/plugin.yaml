# Plugin manifest (data-only) — the remote-access EDGE / front door: Caddy (TLS + reverse proxy)
# + oauth2-proxy (Google SSO forward-auth). OPTIONAL, profile 'edge'. This is the ONE place V2
# publishes a host port (Caddy :443) — every other service is reached THROUGH the edge. Because
# it's opt-in behind its profile, it stays dormant during a beside-run and only comes up post-flip
# (see CUTOVER.md), so it can't fight the live stack's edge. A local floor install skips this and
# is localhost-only.
id: edge
name: Edge (Caddy + oauth2-proxy, remote access)
description: TLS front door + Google SSO forward-auth for remote (Tailscale) access. Opt-in.
requires:
  nvidia: false
  ram_gb: 1
provides: [edge]
compose_profile: edge
env:
  EDGE_ENABLED: "1"
secrets:
  # Google OAuth client + cookie secret, and the bearer gating the /mcp/* remote route.
  - OAUTH2_PROXY_CLIENT_ID
  - OAUTH2_PROXY_CLIENT_SECRET
  - OAUTH2_PROXY_COOKIE_SECRET
  - MCP_GATEWAY_TOKEN
services:
  - name: oauth2-proxy
    # alpine variant ships wget for the healthcheck (the distroless :latest has no shell).
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3-alpine
    wants_secrets: true       # OAUTH2_PROXY_* resolve from secrets.env
    command:
      - --provider=google
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --upstream=static://202
      - --redirect-url=https://${CADDY_TAILNET_HOSTNAME}/oauth2/callback
      - --whitelist-domain=.${CADDY_TAILNET_DOMAIN}
      # ai-toolkit's :8443 site: rd= targets carry the port; the portless entry doesn't match them.
      - --whitelist-domain=${CADDY_TAILNET_HOSTNAME}:8443
      - --cookie-domain=.${CADDY_TAILNET_DOMAIN}
      - --cookie-secure=true
      - --cookie-samesite=lax
      - --cookie-expire=24h
      - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
      - --skip-provider-button=true
    volumes:
      - ./auth/oauth2-proxy/emails.txt:/etc/oauth2-proxy/emails.txt:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4180/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
  - name: caddy
    image: caddy:2.11.4-alpine
    wants_secrets: true       # MCP_GATEWAY_TOKEN resolves from secrets.env
    # CADDY_BIND MUST be the host tailnet IP. The :? failsafe makes `docker compose config` exit
    # non-zero if it's empty/unset — an empty bind silently degrades to 0.0.0.0:443 (V1 lesson).
    ports:
      - "${CADDY_BIND:?CADDY_BIND must be set to the host tailnet IP — never empty or 0.0.0.0}:443:443"
      # ai-toolkit UI site (no-basePath Next.js app — cannot share :443's path space).
      - "${CADDY_BIND:?CADDY_BIND must be set to the host tailnet IP — never empty or 0.0.0.0}:8443:8443"
    env:
      CADDY_TAILNET_HOSTNAME: ${CADDY_TAILNET_HOSTNAME}
      CADDY_TAILNET_DOMAIN: ${CADDY_TAILNET_DOMAIN}
    volumes:
      - ./auth/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${TAILSCALE_CERT_DIR:-./auth/caddy/certs}:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [oauth2-proxy]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
