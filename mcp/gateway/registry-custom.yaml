# Catalog fragment — merged via --additional-catalog with Docker’s online MCP catalog.
# Template: mcp/gateway/registry-custom.yaml — copied to data/mcp/ by ensure_dirs.
# Use the catalog key `registry:` (same as v3 catalog.yaml). Do not use --additional-registry
# for this file: with --servers set, the gateway does not merge registry.yaml for definitions.
# PLACEHOLDER_* replaced at mcp-gateway startup (gateway-wrapper.sh).
registry:
  qdrant-rag:
    description: "Semantic RAG search over the stack's Qdrant `documents` collection. Embeds the query with the local nomic embedder (llamacpp-embed, same vectors as rag-ingestion) and returns the top-K matching chunks with source and score. Use to retrieve indexed knowledge instead of pasting large context. Tools - qdrant_search, qdrant_status."
    title: Qdrant RAG
    type: server
    image: ordo-ai-stack-qdrant-rag-mcp:latest
    env:
      - name: QDRANT_URL
        value: http://qdrant:6333
      - name: EMBED_URL
        value: http://llamacpp-embed:8080
      - name: RAG_COLLECTION
        value: documents
  searxng:
    description: SearXNG MCP server — private, aggregated web search via the self-hosted SearXNG instance (services.searxng in this stack). Replaces the prior Tavily integration; no external API key required.
    title: SearXNG
    type: server
    image: isokoliuk/mcp-searxng
    env:
      - name: SEARXNG_URL
        value: http://searxng:8080
  comfyui:
    description: ComfyUI MCP for Ordo AI Stack (workflows, images, video, model pull, system stats, queue, history, installed models/nodes/extensions).
    title: ComfyUI
    type: server
    image: ordo-ai-stack-comfyui-mcp:latest
    env:
      - name: COMFYUI_URL
        value: http://comfyui:8188
      - name: OPS_CONTROLLER_URL
        value: http://ops-controller:9000
      - name: OPS_CONTROLLER_TOKEN
        value: PLACEHOLDER_OPS_CONTROLLER_TOKEN
      - name: COMFY_MCP_DEFAULT_MODEL
        value: PLACEHOLDER_COMFY_MCP_DEFAULT_MODEL
  orchestration:
    description: Stable orchestration adapter (fixed verbs; dashboard HTTP, not shifting gateway tool names).
    title: Orchestration
    type: server
    image: ordo-ai-stack-orchestration-mcp:latest
    env:
      - name: ORCHESTRATION_DASHBOARD_URL
        value: http://dashboard:8080
      - name: DASHBOARD_AUTH_TOKEN
        value: PLACEHOLDER_DASHBOARD_AUTH_TOKEN
  playwright:
    # Stack-managed Playwright (browser_* tools: navigate, snapshot, screenshot,
    # form-fill, network inspection). Pinned here so the gateway resolves it from
    # THIS catalog instead of Docker's unpinned online catalog — that keeps the
    # image reproducible and stops orphan mcp/playwright containers from
    # accumulating across gateway reloads. Image default CMD is
    # `--headless --browser chromium --no-sandbox`, so no command override needed.
    # SECURITY: this server exposes browser_run_code_unsafe (arbitrary JS in the
    # Playwright process, RCE-equivalent). Acceptable for the single trusted
    # operator; restrict with --caps if ever exposed more widely.
    description: Playwright browser automation — headless Chromium for page navigation, accessibility snapshots, screenshots, form filling, and network inspection (browser_* tools). Stack-managed and pinned (no dependency on Docker's online catalog).
    title: Playwright
    type: server
    image: mcp/playwright@sha256:097d978439237cc9b12e10825836a97245add2be0479272cce9d98c368f024d1
  n8n:
    description: "n8n workflow automation MCP - bridges the local n8n instance plus the full czlonkowski/n8n-mcp node and template catalog. Override of the upstream catalog spec to (1) propagate N8N_API_URL alongside N8N_API_KEY so the n8n_* instance-management tools are registered, and (2) silence the image's startup banner + INFO logs which otherwise pollute the stdio JSON-RPC channel and break the gateway's parser with 'invalid character' errors."
    title: n8n
    type: server
    image: mcp/n8n
    env:
      - name: N8N_API_URL
        value: http://n8n:5678
      - name: N8N_API_KEY
        value: PLACEHOLDER_N8N_API_KEY
      # Suppress the box-drawing banner ('Anonymous Usage Statistics') and
      # INFO log lines this image prints to stdout. With stdio transport, ANY
      # non-JSON-RPC byte before the response makes the gateway crash with
      # 'failed to connect: calling initialize: invalid character'.
      - name: LOG_LEVEL
        value: error
      - name: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - name: DISABLE_TELEMETRY
        value: "true"
  codebase-memory:
    description: "Code knowledge-graph navigation over the repos under your code root (mounted read-only at /c/dev). Structural queries grep can't do cheaply: call graphs, trace paths between symbols, architecture overviews, symbol/snippet lookup. Index is built on demand and persists in a named volume. Tools - index_repository, list_projects, index_status, search_graph, trace_path, query_graph, get_graph_schema, get_code_snippet, get_architecture, search_code, detect_changes, manage_adr, ingest_traces, delete_project. Results are navigation hints - confirm in the actual file before editing."
    title: Codebase Memory
    type: server
    image: ordo-ai-stack-codebase-memory-mcp:latest
    # Keep the indexer container warm across calls within a session.
    longLived: true
    # The indexer is 100% local (bundled embeddings) — no egress needed. This blocks
    # exfiltration of indexed code from the spawned container.
    disableNetwork: true
    volumes:
      # Code root (host path from $CODE_ROOT) mounted READ-ONLY. Under the gateway's
      # 2026-06 bind-mount hardening, host binds must be read-only AND allow-listed via
      # MCP_GATEWAY_DOCKER_BIND_ALLOWED_PATHS (set to CODE_ROOT in docker-compose.yml).
      # PLACEHOLDER_CODE_ROOT is substituted from $CODE_ROOT by gateway-wrapper.sh.
      - "PLACEHOLDER_CODE_ROOT:/c/dev:ro"
      # Persistent SQLite index — a NAMED volume (exempt from host-path restrictions,
      # so it can be read-write). Survives container respawns.
      - "codebase-memory-cache:/cache"
    env:
      - name: CBM_CACHE_DIR
        value: /cache
      # Keep logs off stdout so they can't corrupt the stdio JSON-RPC channel.
      - name: CBM_LOG_LEVEL
        value: error
