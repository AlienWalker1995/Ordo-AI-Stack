# Catalog fragment — merged via --additional-catalog with Docker’s online MCP catalog.
# Template: mcp/gateway/registry-custom.yaml — copied to data/mcp/ by ensure_dirs.
# Use the catalog key `registry:` (same as v3 catalog.yaml). Do not use --additional-registry
# for this file: with --servers set, the gateway does not merge registry.yaml for definitions.
# PLACEHOLDER_* replaced at mcp-gateway startup (gateway-wrapper.sh).
registry:
  searxng:
    description: SearXNG MCP server — private, aggregated web search via the self-hosted SearXNG instance (services.searxng in this stack). Replaces the prior Tavily integration; no external API key required.
    title: SearXNG
    type: server
    image: isokoliuk/mcp-searxng
    env:
      - name: SEARXNG_URL
        value: http://searxng:8080
  comfyui:
    description: ComfyUI MCP for Ordo AI Stack (workflows, images, video, model pull, system stats, queue, history, installed models/nodes/extensions).
    title: ComfyUI
    type: server
    image: ordo-ai-stack-comfyui-mcp:latest
    env:
      - name: COMFYUI_URL
        value: http://comfyui:8188
      - name: OPS_CONTROLLER_URL
        value: http://ops-controller:9000
      - name: OPS_CONTROLLER_TOKEN
        value: PLACEHOLDER_OPS_CONTROLLER_TOKEN
      - name: COMFY_MCP_DEFAULT_MODEL
        value: PLACEHOLDER_COMFY_MCP_DEFAULT_MODEL
  orchestration:
    description: Stable orchestration adapter (fixed verbs; dashboard HTTP, not shifting gateway tool names).
    title: Orchestration
    type: server
    image: ordo-ai-stack-orchestration-mcp:latest
    env:
      - name: ORCHESTRATION_DASHBOARD_URL
        value: http://dashboard:8080
      - name: DASHBOARD_AUTH_TOKEN
        value: PLACEHOLDER_DASHBOARD_AUTH_TOKEN
  n8n:
    description: "n8n workflow automation MCP - bridges the local n8n instance plus the full czlonkowski/n8n-mcp node and template catalog. Override of the upstream catalog spec to (1) propagate N8N_API_URL alongside N8N_API_KEY so the n8n_* instance-management tools are registered, and (2) silence the image's startup banner + INFO logs which otherwise pollute the stdio JSON-RPC channel and break the gateway's parser with 'invalid character' errors."
    title: n8n
    type: server
    image: mcp/n8n
    env:
      - name: N8N_API_URL
        value: http://n8n:5678
      - name: N8N_API_KEY
        value: PLACEHOLDER_N8N_API_KEY
      # Suppress the box-drawing banner ('Anonymous Usage Statistics') and
      # INFO log lines this image prints to stdout. With stdio transport, ANY
      # non-JSON-RPC byte before the response makes the gateway crash with
      # 'failed to connect: calling initialize: invalid character'.
      - name: LOG_LEVEL
        value: error
      - name: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - name: DISABLE_TELEMETRY
        value: "true"
