# Custom MCP registry — ComfyUI (not in Docker MCP catalog).
# Copied to data/mcp/ by ensure_dirs. Gateway uses --additional-registry to load it.
# ComfyUI MCP uses stdio (see comfyui-mcp/Dockerfile CMD) so the gateway can communicate.
# PLACEHOLDER_OPS_CONTROLLER_TOKEN is replaced at gateway startup from mcp-gateway env (see gateway-wrapper.sh).
servers:
  comfyui:
    image: ai-toolkit-comfyui-mcp:latest
    env:
      COMFYUI_URL: http://comfyui:8188
      OPS_CONTROLLER_URL: http://ops-controller:9000
      OPS_CONTROLLER_TOKEN: PLACEHOLDER_OPS_CONTROLLER_TOKEN
